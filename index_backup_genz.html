<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScrapeFlow - GenZ Edition 🔥</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #FF006E;
  --secondary: #FB5607;
  --accent: #FFBE0B;
  --purple: #8338EC;
  --cyan: #06FFB4;
  --dark: #0A0E27;
  --darker: #060818;
  --light: #FFFFFF;
  --gray: #94A3B8;
  --glass: rgba(255, 255, 255, 0.1);
  --glass-border: rgba(255, 255, 255, 0.2);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: var(--darker);
  color: var(--light);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* Animated gradient background */
.bg-gradient {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(45deg, #060818, #1A1F3A, #2D1B69, #0F172A);
  background-size: 400% 400%;
  animation: gradientShift 15s ease infinite;
  z-index: -2;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Floating particles */
.particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  overflow: hidden;
}

.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: var(--cyan);
  border-radius: 50%;
  animation: float 20s infinite linear;
}

@keyframes float {
  0% {
    transform: translateY(100vh) translateX(0);
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  90% {
    opacity: 1;
  }
  100% {
    transform: translateY(-100vh) translateX(100px);
    opacity: 0;
  }
}

/* Glass morphism container */
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 20px;
  position: relative;
  z-index: 1;
}

/* Header */
header {
  padding: 20px 0;
  backdrop-filter: blur(20px);
  background: var(--glass);
  border-bottom: 1px solid var(--glass-border);
  position: sticky;
  top: 0;
  z-index: 1000;
}

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 24px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: logoGlow 3s ease-in-out infinite;
}

@keyframes logoGlow {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.3); }
}

.logo-icon {
  width: 45px;
  height: 45px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-radius: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  animation: rotate 10s linear infinite;
  box-shadow: 0 0 30px rgba(255, 0, 110, 0.5);
}

@keyframes rotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.nav-actions {
  display: flex;
  align-items: center;
  gap: 20px;
}

.server-status {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  font-size: 14px;
  font-weight: 600;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--gray);
  animation: pulse 2s infinite;
}

.status-dot.online {
  background: var(--cyan);
  box-shadow: 0 0 10px var(--cyan);
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.nav-tabs {
  display: flex;
  gap: 8px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 25px;
  padding: 4px;
}

.nav-tab {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: transparent;
  color: var(--gray);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.nav-tab::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  opacity: 0;
  transition: opacity 0.3s;
  z-index: -1;
}

.nav-tab.active {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: var(--light);
  transform: scale(1.05);
  box-shadow: 0 5px 20px rgba(255, 0, 110, 0.4);
}

.nav-tab:hover:not(.active) {
  color: var(--light);
  transform: translateY(-2px);
}

.nav-tab:hover:not(.active)::before {
  opacity: 0.1;
}

/* Main content */
main {
  padding: 60px 0;
}

.hero {
  text-align: center;
  margin-bottom: 80px;
}

.hero h1 {
  font-size: clamp(48px, 8vw, 96px);
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: 20px;
  background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: textGlow 4s ease-in-out infinite;
}

@keyframes textGlow {
  0%, 100% { filter: brightness(1) hue-rotate(0deg); }
  50% { filter: brightness(1.2) hue-rotate(10deg); }
}

.hero .subtitle {
  font-size: clamp(24px, 4vw, 48px);
  font-weight: 700;
  color: var(--cyan);
  margin-bottom: 30px;
  text-shadow: 0 0 30px rgba(6, 255, 180, 0.5);
}

.hero .description {
  font-size: 18px;
  color: var(--gray);
  max-width: 600px;
  margin: 0 auto 40px;
  line-height: 1.6;
}

.features {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 60px;
  flex-wrap: wrap;
}

.feature-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 20px 30px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 600;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter: blur(10px);
  position: relative;
  overflow: hidden;
}

.feature-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  opacity: 0;
  transition: opacity 0.3s;
  z-index: -1;
}

.feature-card:hover {
  transform: translateY(-5px) scale(1.05);
  border-color: var(--primary);
  box-shadow: 0 10px 40px rgba(255, 0, 110, 0.3);
}

.feature-card:hover::before {
  opacity: 0.1;
}

.feature-icon {
  width: 30px;
  height: 30px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

/* URL Input Section */
.url-section {
  max-width: 800px;
  margin: 0 auto;
  position: relative;
}

.url-container {
  background: var(--glass);
  border: 2px solid var(--glass-border);
  border-radius: 30px;
  padding: 40px;
  backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
}

.url-container::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, transparent, var(--cyan), transparent);
  animation: shimmer 3s infinite;
}

@keyframes shimmer {
  0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
  100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
}

.url-input-wrapper {
  position: relative;
  margin-bottom: 30px;
}

.url-input {
  width: 100%;
  padding: 20px 25px 20px 60px;
  background: rgba(255, 255, 255, 0.05);
  border: 2px solid var(--glass-border);
  border-radius: 20px;
  font-size: 18px;
  font-family: 'Space Mono', monospace;
  color: var(--light);
  outline: none;
  transition: all 0.3s;
  backdrop-filter: blur(10px);
}

.url-input::placeholder {
  color: var(--gray);
}

.url-input:focus {
  border-color: var(--cyan);
  box-shadow: 0 0 30px rgba(6, 255, 180, 0.3);
  transform: translateY(-2px);
}

.url-icon {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 20px;
  color: var(--cyan);
  animation: bounce 2s infinite;
}

@keyframes bounce {
  0%, 100% { transform: translateY(-50%) scale(1); }
  50% { transform: translateY(-50%) scale(1.2); }
}

.url-status {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 25px;
  font-size: 14px;
  color: var(--cyan);
  font-weight: 600;
  opacity: 0;
  transition: all 0.3s;
}

.url-status.show {
  opacity: 1;
  transform: translateX(10px);
}

.scrape-btn {
  width: 100%;
  padding: 20px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border: none;
  border-radius: 20px;
  font-size: 20px;
  font-weight: 800;
  color: var(--light);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.scrape-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
  transition: left 0.5s;
}

.scrape-btn:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: 0 15px 40px rgba(255, 0, 110, 0.4);
}

.scrape-btn:hover::before {
  left: 100%;
}

.scrape-btn:active {
  transform: translateY(-1px) scale(1.01);
}

.scrape-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

/* Results Section */
.results-section {
  max-width: 1000px;
  margin: 60px auto 0;
  display: none;
}

.results-section.show {
  display: block;
  animation: slideUp 0.5s ease-out;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(50px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.results-container {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 30px;
  padding: 40px;
  backdrop-filter: blur(20px);
}

.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 30px;
  border-bottom: 1px solid var(--glass-border);
  padding-bottom: 20px;
  flex-wrap: wrap;
}

.tab {
  padding: 12px 24px;
  background: transparent;
  border: 2px solid var(--glass-border);
  border-radius: 20px;
  font-size: 14px;
  font-weight: 700;
  color: var(--gray);
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.tab::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  opacity: 0;
  transition: opacity 0.3s;
  z-index: -1;
}

.tab.active {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: var(--light);
  border-color: transparent;
  transform: scale(1.05);
  box-shadow: 0 5px 20px rgba(255, 0, 110, 0.4);
}

.tab:hover:not(.active) {
  color: var(--light);
  border-color: var(--primary);
  transform: translateY(-2px);
}

.tab:hover:not(.active)::before {
  opacity: 0.1;
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
  animation: fadeIn 0.3s ease-out;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.data-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  background: rgba(255, 255, 255, 0.02);
  border-radius: 15px;
  overflow: hidden;
}

.data-table th,
.data-table td {
  padding: 15px;
  text-align: left;
  border-bottom: 1px solid var(--glass-border);
}

.data-table th {
  background: rgba(255, 255, 255, 0.05);
  font-weight: 700;
  color: var(--cyan);
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.data-table td {
  font-size: 14px;
  color: var(--gray);
  font-family: 'Space Mono', monospace;
}

.data-table tr:hover {
  background: rgba(255, 255, 255, 0.05);
}

.data-table a {
  color: var(--cyan);
  text-decoration: none;
  transition: color 0.3s;
}

.data-table a:hover {
  color: var(--accent);
}

.text-content {
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid var(--glass-border);
  border-radius: 15px;
  padding: 25px;
  margin-top: 20px;
  max-height: 500px;
  overflow-y: auto;
  font-family: 'Space Mono', monospace;
  font-size: 14px;
  line-height: 1.8;
  color: var(--gray);
}

.text-content::-webkit-scrollbar {
  width: 8px;
}

.text-content::-webkit-scrollbar-track {
  background: rgba(255, 255, 255, 0.05);
  border-radius: 10px;
}

.text-content::-webkit-scrollbar-thumb {
  background: var(--primary);
  border-radius: 10px;
}

.images-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
  margin-top: 20px;
}

.image-card {
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid var(--glass-border);
  border-radius: 15px;
  overflow: hidden;
  transition: all 0.3s;
  position: relative;
}

.image-card:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 10px 30px rgba(255, 0, 110, 0.3);
  border-color: var(--primary);
}

.image-card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  display: block;
}

.image-info {
  padding: 15px;
  font-size: 12px;
  color: var(--gray);
  font-family: 'Space Mono', monospace;
  background: rgba(255, 255, 255, 0.02);
}

/* Loading state */
.loading {
  text-align: center;
  padding: 60px;
  color: var(--gray);
}

.spinner {
  width: 60px;
  height: 60px;
  border: 4px solid var(--glass-border);
  border-top-color: var(--cyan);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 30px;
  box-shadow: 0 0 30px rgba(6, 255, 180, 0.5);
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 20px;
}

.method-steps {
  display: flex;
  flex-direction: column;
  gap: 15px;
  align-items: center;
  max-width: 400px;
  margin: 0 auto;
}

.method-step {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 15px 20px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--glass-border);
  border-radius: 15px;
  font-size: 14px;
  font-family: 'Space Mono', monospace;
  color: var(--gray);
  transition: all 0.3s;
  width: 100%;
}

.method-step.active {
  border-color: var(--cyan);
  color: var(--cyan);
  background: rgba(6, 255, 180, 0.1);
  box-shadow: 0 0 20px rgba(6, 255, 180, 0.3);
}

.method-step.success {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(255, 190, 11, 0.1);
}

.method-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--gray);
  transition: all 0.3s;
}

.method-step.active .method-dot {
  background: var(--cyan);
  animation: pulse 1s infinite;
  box-shadow: 0 0 10px var(--cyan);
}

.method-step.success .method-dot {
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent);
}

/* Error state */
.error {
  background: rgba(255, 0, 110, 0.1);
  border: 1px solid var(--primary);
  border-radius: 20px;
  padding: 30px;
  text-align: center;
  margin: 40px 0;
}

.error-icon {
  font-size: 48px;
  margin-bottom: 20px;
  color: var(--primary);
}

.error-title {
  font-size: 24px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 10px;
}

.error-message {
  font-size: 16px;
  color: var(--gray);
  margin-bottom: 20px;
}

/* Responsive */
@media (max-width: 768px) {
  .hero h1 {
    font-size: 48px;
  }
  
  .hero .subtitle {
    font-size: 24px;
  }
  
  .features {
    flex-direction: column;
    align-items: center;
  }
  
  .feature-card {
    width: 100%;
    max-width: 300px;
    justify-content: center;
  }
  
  .url-container {
    padding: 30px 20px;
  }
  
  .tabs {
    gap: 8px;
  }
  
  .tab {
    padding: 10px 16px;
    font-size: 12px;
  }
  
  .images-grid {
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
  }
}

/* Custom scrollbar */
::-webkit-scrollbar {
  width: 10px;
}

::-webkit-scrollbar-track {
  background: rgba(255, 255, 255, 0.05);
}

::-webkit-scrollbar-thumb {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-radius: 10px;
}

::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(135deg, var(--secondary), var(--primary));
}
</style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="particles" id="particles"></div>

<header>
  <div class="container">
    <nav class="nav">
      <div class="logo">
        <div class="logo-icon">🔥</div>
        ScrapeFlow
      </div>
      <div class="nav-actions">
        <div class="server-status">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText">Checking...</span>
        </div>
        <div class="nav-tabs">
          <button class="nav-tab active" onclick="switchView('scraper')">🚀 Scraper</button>
          <button class="nav-tab" onclick="switchView('history')">📚 History</button>
        </div>
      </div>
    </nav>
  </div>
</header>

<main>
  <div class="container">
    <div class="hero">
      <h1>ScrapeFlow</h1>
      <div class="subtitle">LEVEL UP YOUR WEB SCRAPING 🔥</div>
      <p class="description">
        Transform any website into structured data with our GenZ-powered scraper. 
        No cap, this is the most fire scraping tool on the internet. 💯
      </p>
      
      <div class="features">
        <div class="feature-card">
          <div class="feature-icon">⚡</div>
          Lightning Fast
        </div>
        <div class="feature-card">
          <div class="feature-icon">🤖</div>
          AI Powered
        </div>
        <div class="feature-card">
          <div class="feature-icon">🔒</div>
          Anti-Bot Proof
        </div>
      </div>
    </div>
    
    <div class="url-section">
      <div class="url-container">
        <div class="url-input-wrapper">
          <span class="url-icon">🔗</span>
          <input 
            type="url" 
            class="url-input" 
            id="urlInput" 
            placeholder="https://example.com"
            autocomplete="off"
          >
        </div>
        
        <div class="url-status" id="urlStatus">
          <div class="status-dot"></div>
          URL ready to scrape! 🚀
        </div>
        
        <button class="scrape-btn" id="scrapeBtn" onclick="startScrape()">
          SCRAPE NOW
        </button>
      </div>
    </div>
    
    <div class="results-section" id="resultsSection">
      <div class="results-container">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('text')">📄 Text</button>
          <button class="tab" onclick="switchTab('links')">🔗 Links</button>
          <button class="tab" onclick="switchTab('images')">🖼 Images</button>
          <button class="tab" onclick="switchTab('meta')">🏷 Meta</button>
        </div>
        
        <div class="tab-content active" id="textTab">
          <div id="textContent"></div>
        </div>
        
        <div class="tab-content" id="linksTab">
          <div id="linksContent"></div>
        </div>
        
        <div class="tab-content" id="imagesTab">
          <div id="imagesContent"></div>
        </div>
        
        <div class="tab-content" id="metaTab">
          <div id="metaContent"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
const API = 'http://localhost:5000';
let currentResult = null;

// Create floating particles
function createParticles() {
  const particlesContainer = document.getElementById('particles');
  for (let i = 0; i < 50; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 20 + 's';
    particle.style.animationDuration = (15 + Math.random() * 10) + 's';
    particlesContainer.appendChild(particle);
  }
}

// URL validation
const urlInput = document.getElementById('urlInput');
const urlStatus = document.getElementById('urlStatus');
const scrapeBtn = document.getElementById('scrapeBtn');

urlInput.addEventListener('input', function() {
  const url = this.value.trim();
  if (url && isValidUrl(url)) {
    urlStatus.classList.add('show');
    scrapeBtn.disabled = false;
  } else {
    urlStatus.classList.remove('show');
    scrapeBtn.disabled = true;
  }
});

function isValidUrl(string) {
  try {
    new URL(string);
    return true;
  } catch (_) {
    return false;
  }
}

// Tab switching
function switchTab(tabName) {
  document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
  
  event.target.classList.add('active');
  document.getElementById(tabName + 'Tab').classList.add('active');
}

// View switching
function switchView(view) {
  document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
  event.target.classList.add('active');
  
  if (view === 'scraper') {
    document.querySelector('.hero').style.display = 'block';
    document.querySelector('.url-section').style.display = 'block';
    document.getElementById('resultsSection').style.display = 'none';
  } else {
    document.querySelector('.hero').style.display = 'none';
    document.querySelector('.url-section').style.display = 'none';
    document.getElementById('resultsSection').style.display = 'block';
    // Load history here if needed
  }
}

// Server health check
async function checkServer() {
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  
  try {
    const response = await fetch(API + '/health', { signal: AbortSignal.timeout(3000) });
    if (response.ok) {
      statusDot.className = 'status-dot online';
      statusText.textContent = 'Server Online';
      return true;
    }
  } catch (error) {
    statusDot.className = 'status-dot';
    statusText.textContent = 'Server Offline';
    return false;
  }
}

// Main scraping function
async function startScrape() {
  let url = urlInput.value.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

  const online = await checkServer();
  if (!online) {
    showError('Server is offline. Please start the Python backend first.');
    return;
  }

  // Show loading state
  scrapeBtn.disabled = true;
  scrapeBtn.textContent = 'SCRAPING...';
  
  const resultsSection = document.getElementById('resultsSection');
  resultsSection.classList.add('show');
  
  // Show loading animation
  document.getElementById('textContent').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Scraping ${url}...</div>
      <div class="method-steps">
        <div class="method-step active" id="step1">
          <div class="method-dot"></div>
          ⚡ Trying requests + BeautifulSoup (fast)
        </div>
        <div class="method-step" id="step2">
          <div class="method-dot"></div>
          🎭 Fallback to Playwright (JS support)
        </div>
      </div>
    </div>
  `;

  try {
    const response = await fetch(API + '/scrape', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: url })
    });

    if (!response.ok) throw new Error('Scraping failed');
    
    const result = await response.json();
    
    if (!result.ok) {
      throw new Error(result.error || 'Scraping failed');
    }
    
    currentResult = result.data;
    
    // Update method steps
    if (result.data.method === 'requests') {
      document.getElementById('step1').className = 'method-step success';
      document.getElementById('step2').className = 'method-step';
    } else {
      document.getElementById('step1').className = 'method-step';
      document.getElementById('step2').className = 'method-step success';
    }
    
    setTimeout(() => {
      displayResults(result.data);
    }, 1000);
    
  } catch (error) {
    console.error('Scraping error:', error);
    showError('Failed to scrape the website. Please try again.\n\n' + error.message);
  } finally {
    scrapeBtn.disabled = false;
    scrapeBtn.textContent = 'SCRAPE NOW';
  }
}

function displayResults(data) {
  // Display text content
  const textContent = document.getElementById('textContent');
  textContent.innerHTML = `
    <h3 style="color: var(--cyan); margin-bottom: 20px;">📄 Extracted Text</h3>
    <div class="text-content">${data.text || 'No text found'}</div>
  `;
  
  // Display links
  const linksContent = document.getElementById('linksContent');
  if (data.links && data.links.length > 0) {
    linksContent.innerHTML = `
      <h3 style="color: var(--cyan); margin-bottom: 20px;">🔗 Found Links (${data.links.length})</h3>
      <table class="data-table">
        <thead>
          <tr><th>#</th><th>Text</th><th>URL</th></tr>
        </thead>
        <tbody>
          ${data.links.map((link, i) => `
            <tr>
              <td>${i + 1}</td>
              <td>${link.text || 'N/A'}</td>
              <td><a href="${link.href}" target="_blank">${link.href}</a></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  } else {
    linksContent.innerHTML = '<h3 style="color: var(--gray);">No links found</h3>';
  }
  
  // Display images
  const imagesContent = document.getElementById('imagesContent');
  if (data.images && data.images.length > 0) {
    imagesContent.innerHTML = `
      <h3 style="color: var(--cyan); margin-bottom: 20px;">🖼 Found Images (${data.images.length})</h3>
      <div class="images-grid">
        ${data.images.map(img => `
          <div class="image-card">
            <img src="${img.src}" alt="${img.alt || ''}" loading="lazy">
            <div class="image-info">${img.alt || 'No alt text'}</div>
          </div>
        `).join('')}
      </div>
    `;
  } else {
    imagesContent.innerHTML = '<h3 style="color: var(--gray);">No images found</h3>';
  }
  
  // Display meta data
  const metaContent = document.getElementById('metaContent');
  const metas = data.metas || [];
  const metaTags = {};
  metas.forEach(meta => {
    metaTags[meta.name] = meta.content;
  });
  
  metaContent.innerHTML = `
    <h3 style="color: var(--cyan); margin-bottom: 20px;">🏷 Meta Information</h3>
    <table class="data-table">
      <thead>
        <tr><th>Property</th><th>Value</th></tr>
      </thead>
      <tbody>
        <tr><td>Title</td><td>${data.title || 'N/A'}</td></tr>
        <tr><td>Description</td><td>${metaTags.description || 'N/A'}</td></tr>
        <tr><td>Keywords</td><td>${metaTags.keywords || 'N/A'}</td></tr>
        <tr><td>Method</td><td>${data.method || 'N/A'}</td></tr>
        <tr><td>Word Count</td><td>${data.word_count || '0'}</td></tr>
      </tbody>
    </table>
  `;
}

function showError(message) {
  const resultsSection = document.getElementById('resultsSection');
  resultsSection.classList.add('show');
  resultsSection.innerHTML = `
    <div class="results-container">
      <div class="error">
        <div class="error-icon">💥</div>
        <div class="error-title">Scraping Failed</div>
        <div class="error-message">${message}</div>
      </div>
    </div>
  `;
}

// Initialize
createParticles();
checkServer();
setInterval(checkServer, 10000);

// Add enter key support
urlInput.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    startScrape();
  }
});
</script>
