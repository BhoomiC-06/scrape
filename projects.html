<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects - ScrapeFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* Light theme */
  --bg-primary: #ffffff;
  --bg-secondary: #f8fafc;
  --bg-tertiary: #f1f5f9;
  --bg-glass: rgba(255, 255, 255, 0.8);
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-tertiary: #94a3b8;
  --border: #e2e8f0;
  --border-light: #f1f5f9;
  --primary: #3b82f6;
  --primary-dark: #2563eb;
  --primary-light: #60a5fa;
  --secondary: #10b981;
  --accent: #8b5cf6;
  --accent-light: #a78bfa;
  --danger: #ef4444;
  --warning: #f59e0b;
  --success: #10b981;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
  --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
  --gradient-primary: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
  --gradient-secondary: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 24px;
}

/* Dark theme */
[data-theme="dark"] {
  --bg-primary: #0f172a;
  --bg-secondary: #1e293b;
  --bg-tertiary: #334155;
  --bg-glass: rgba(30, 41, 59, 0.8);
  --text-primary: #f8fafc;
  --text-secondary: #cbd5e1;
  --text-tertiary: #94a3b8;
  --border: #334155;
  --border-light: #475569;
  --primary: #60a5fa;
  --primary-dark: #3b82f6;
  --primary-light: #93c5fd;
  --secondary: #34d399;
  --accent: #a78bfa;
  --accent-light: #c4b5fd;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5);
  --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.6);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  overflow-x: hidden;
  transition: background 0.3s ease, color 0.3s ease;
  min-height: 100vh;
}

/* Animated background */
.bg-gradient {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
    radial-gradient(circle at 40% 60%, rgba(16, 185, 129, 0.08) 0%, transparent 50%);
  z-index: -1;
  transition: opacity 0.3s ease;
  animation: gradientShift 10s ease-in-out infinite;
}

@keyframes gradientShift {
  0%, 100% { transform: scale(1) rotate(0deg); }
  50% { transform: scale(1.1) rotate(2deg); }
}

[data-theme="dark"] .bg-gradient {
  opacity: 0.4;
}

/* Layout */
.projects-layout {
  display: flex;
  min-height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 280px;
  background: var(--bg-glass);
  border-right: 1px solid var(--border);
  backdrop-filter: blur(20px);
  transition: all 0.3s ease;
  position: fixed;
  height: 100vh;
  z-index: 100;
  overflow-y: auto;
}

.sidebar-header {
  padding: 24px;
  border-bottom: 1px solid var(--border);
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 24px;
  font-weight: 800;
  color: var(--text-primary);
  transition: color 0.3s ease;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: var(--gradient-primary);
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 18px;
  box-shadow: var(--shadow-md);
  transition: all 0.3s ease;
}

.logo:hover .logo-icon {
  transform: scale(1.05) rotate(5deg);
  box-shadow: var(--shadow-lg);
}

/* Navigation */
.nav-menu {
  padding: 16px 0;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 24px;
  color: var(--text-secondary);
  text-decoration: none;
  font-weight: 500;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.nav-item::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--gradient-primary);
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}

.nav-item:hover {
  color: var(--primary);
  background: var(--bg-secondary);
  transform: translateX(4px);
}

.nav-item:hover::before {
  opacity: 0.05;
}

.nav-item.active {
  color: var(--primary);
  background: var(--bg-secondary);
  border-right: 3px solid var(--primary);
}

.nav-icon {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

/* Main Content */
.main-content {
  flex: 1;
  margin-left: 280px;
  padding: 0;
  position: relative;
}

/* Header */
.header {
  background: var(--bg-glass);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px);
  padding: 16px 32px;
  position: sticky;
  top: 0;
  z-index: 50;
  transition: all 0.3s ease;
}

.header-content {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.page-title {
  font-size: 24px;
  font-weight: 700;
  color: var(--text-primary);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 16px;
}

.create-btn {
  padding: 10px 20px;
  background: var(--gradient-primary);
  border: none;
  border-radius: var(--radius-lg);
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
}

.create-btn:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg);
}

.action-btn {
  width: 40px;
  height: 40px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.action-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--gradient-primary);
  opacity: 0;
  transition: opacity 0.3s ease;
}

.action-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
  transform: scale(1.05);
}

.action-btn:hover::before {
  opacity: 0.1;
}

/* Projects Content */
.projects-content {
  padding: 32px;
}

/* Filters */
.filters-section {
  display: flex;
  gap: 16px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}

.search-bar {
  flex: 1;
  min-width: 300px;
  position: relative;
}

.search-input {
  width: 100%;
  padding: 10px 16px 10px 40px;
  background: var(--bg-glass);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  font-size: 14px;
  color: var(--text-primary);
  outline: none;
  transition: all 0.3s ease;
  backdrop-filter: blur(20px);
}

.search-input::placeholder {
  color: var(--text-tertiary);
}

.search-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
}

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-tertiary);
  font-size: 16px;
}

.filter-dropdown {
  padding: 10px 16px;
  background: var(--bg-glass);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  font-size: 14px;
  color: var(--text-primary);
  outline: none;
  cursor: pointer;
  transition: all 0.3s ease;
  backdrop-filter: blur(20px);
}

.filter-dropdown:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
}

/* Projects Grid */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
  gap: 24px;
}

.project-card {
  background: var(--bg-glass);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 24px;
  backdrop-filter: blur(20px);
  transition: all 0.3s ease;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.project-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--gradient-primary);
  opacity: 0;
  transition: opacity 0.3s ease;
}

.project-card:hover {
  border-color: var(--primary);
  transform: translateY(-4px);
  box-shadow: var(--shadow-xl);
}

.project-card:hover::before {
  opacity: 0.03;
}

.project-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 16px;
}

.project-icon {
  width: 48px;
  height: 48px;
  background: var(--gradient-primary);
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: white;
  transition: all 0.3s ease;
}

.project-card:hover .project-icon {
  transform: scale(1.1) rotate(5deg);
}

.project-status {
  padding: 4px 8px;
  border-radius: var(--radius);
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
}

.project-status.active {
  background: rgba(16, 185, 129, 0.1);
  color: var(--success);
}

.project-status.paused {
  background: rgba(245, 158, 11, 0.1);
  color: var(--warning);
}

.project-status.completed {
  background: rgba(59, 130, 246, 0.1);
  color: var(--primary);
}

.project-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.project-description {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 16px;
  line-height: 1.5;
}

.project-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 16px;
}

.project-stat {
  text-align: center;
}

.stat-value {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.stat-label {
  font-size: 12px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.project-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 16px;
  border-top: 1px solid var(--border-light);
}

.project-date {
  font-size: 12px;
  color: var(--text-tertiary);
}

.project-actions {
  display: flex;
  gap: 8px;
}

.action-icon {
  width: 32px;
  height: 32px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.3s ease;
}

.action-icon:hover {
  border-color: var(--primary);
  color: var(--primary);
  transform: scale(1.1);
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-secondary);
}

.empty-icon {
  font-size: 64px;
  margin-bottom: 16px;
  opacity: 0.5;
}

.empty-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.empty-description {
  font-size: 16px;
  margin-bottom: 24px;
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(5px);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

.modal.active {
  display: flex;
}

.modal-content {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-2xl);
  padding: 32px;
  width: 90%;
  max-width: 500px;
  box-shadow: var(--shadow-xl);
  animation: modalSlideIn 0.3s ease;
}

@keyframes modalSlideIn {
  from {
    opacity: 0;
    transform: translateY(-20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}

.modal-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
}

.modal-close {
  width: 32px;
  height: 32px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s ease;
}

.modal-close:hover {
  border-color: var(--danger);
  color: var(--danger);
  transform: scale(1.1);
}

.form-group {
  margin-bottom: 20px;
}

.form-label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  padding: 12px 16px;
  background: var(--bg-secondary);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  font-size: 16px;
  color: var(--text-primary);
  outline: none;
  transition: all 0.3s ease;
  font-family: 'Inter', sans-serif;
}

.form-input::placeholder {
  color: var(--text-tertiary);
}

.form-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
  transform: translateY(-1px);
}

.form-textarea {
  min-height: 100px;
  resize: vertical;
}

.modal-actions {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
  margin-top: 24px;
}

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: var(--radius-lg);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn-primary {
  background: var(--gradient-primary);
  color: white;
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.btn-secondary {
  background: var(--bg-secondary);
  color: var(--text-primary);
  border: 2px solid var(--border);
}

.btn-secondary:hover {
  border-color: var(--primary);
  color: var(--primary);
}

/* Theme Toggle */
.theme-toggle {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-2xl);
  padding: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.theme-toggle::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--gradient-primary);
  opacity: 0;
  transition: opacity 0.3s ease;
  border-radius: inherit;
}

.theme-toggle:hover {
  border-color: var(--primary);
  transform: scale(1.05) rotate(180deg);
}

.theme-toggle:hover::before {
  opacity: 0.1;
}

.theme-icon {
  font-size: 18px;
  transition: transform 0.3s ease;
}

.theme-toggle:hover .theme-icon {
  transform: rotate(180deg);
}

/* Responsive */
@media (max-width: 1024px) {
  .sidebar {
    transform: translateX(-100%);
  }
  
  .sidebar.open {
    transform: translateX(0);
  }
  
  .main-content {
    margin-left: 0;
  }
  
  .projects-grid {
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  }
}

@media (max-width: 768px) {
  .projects-content {
    padding: 20px;
  }
  
  .filters-section {
    flex-direction: column;
  }
  
  .search-bar {
    min-width: 100%;
  }
  
  .projects-grid {
    grid-template-columns: 1fr;
  }
  
  .project-stats {
    grid-template-columns: 1fr;
    gap: 8px;
  }
}

@media (max-width: 480px) {
  .header {
    padding: 16px 20px;
  }
  
  .projects-content {
    padding: 16px;
  }
  
  .project-card {
    padding: 20px;
  }
  
  .modal-content {
    padding: 24px 20px;
  }
}
</style>
</head>
<body>
<div class="bg-gradient"></div>

<div class="projects-layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">🚀</div>
        ScrapeFlow
      </div>
    </div>
    
    <nav class="nav-menu">
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon">📊</span>
        Dashboard
      </a>
      <a href="index.html" class="nav-item">
        <span class="nav-icon">🔍</span>
        Scraping
      </a>
      <a href="projects.html" class="nav-item active">
        <span class="nav-icon">📁</span>
        Projects
      </a>
      <a href="analytics.html" class="nav-item">
        <span class="nav-icon">📈</span>
        Analytics
      </a>
      <a href="api.html" class="nav-item">
        <span class="nav-icon">🔗</span>
        APIs
      </a>
      <a href="settings.html" class="nav-item">
        <span class="nav-icon">⚙️</span>
        Settings
      </a>
      <a href="profile.html" class="nav-item">
        <span class="nav-icon">👤</span>
        Profile
      </a>
    </nav>
  </aside>
  
  <!-- Main Content -->
  <main class="main-content">
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <h1 class="page-title">Projects</h1>
        <div class="header-actions">
          <a href="#" class="create-btn" onclick="openModal()">
            <span>+</span>
            New Project
          </a>
          <button class="action-btn theme-toggle" onclick="toggleTheme()" title="Toggle theme">
            <span class="theme-icon" id="themeIcon">🌙</span>
          </button>
        </div>
      </div>
    </header>
    
    <!-- Projects Content -->
    <div class="projects-content">
      <!-- Filters -->
      <div class="filters-section">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" placeholder="Search projects..." id="searchInput">
        </div>
        
        <select class="filter-dropdown" id="statusFilter">
          <option value="">All Status</option>
          <option value="active">Active</option>
          <option value="paused">Paused</option>
          <option value="completed">Completed</option>
        </select>
        
        <select class="filter-dropdown" id="sortBy">
          <option value="recent">Most Recent</option>
          <option value="name">Name</option>
          <option value="scrapes">Most Scrapes</option>
        </select>
      </div>
      
      <!-- Projects Grid -->
      <div class="projects-grid" id="projectsGrid">
        <!-- Projects will be dynamically loaded here -->
      </div>
      
      <!-- Empty State -->
      <div class="empty-state" id="emptyState" style="display: none;">
        <div class="empty-icon">📁</div>
        <h3 class="empty-title">No Projects Yet</h3>
        <p class="empty-description">Create your first scraping project to get started</p>
        <a href="#" class="create-btn" onclick="openModal()">
          <span>+</span>
          Create Project
        </a>
      </div>
    </div>
  </main>
</div>

<!-- Create Project Modal -->
<div class="modal" id="createModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title">Create New Project</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    
    <form id="projectForm">
      <div class="form-group">
        <label class="form-label" for="projectName">Project Name</label>
        <input type="text" class="form-input" id="projectName" placeholder="Enter project name" required>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="projectDescription">Description</label>
        <textarea class="form-input form-textarea" id="projectDescription" placeholder="Describe your project"></textarea>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="targetUrl">Target URL</label>
        <input type="url" class="form-input" id="targetUrl" placeholder="https://example.com" required>
      </div>
      
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">Create Project</button>
      </div>
    </form>
  </div>
</div>

<script>
// Theme management
function initTheme() {
  const savedTheme = localStorage.getItem('scrapeflow_theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
  updateThemeIcon(savedTheme);
}

function toggleTheme() {
  const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
  const newTheme = currentTheme === 'light' ? 'dark' : 'light';
  
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('scrapeflow_theme', newTheme);
  updateThemeIcon(newTheme);
}

function updateThemeIcon(theme) {
  const icon = document.getElementById('themeIcon');
  icon.textContent = theme === 'light' ? '🌙' : '☀️';
}

// Load projects
function loadProjects(filteredProjects = projects) {
  const grid = document.getElementById('projectsGrid');
  const emptyState = document.getElementById('emptyState');
  
  if (filteredProjects.length === 0) {
    grid.style.display = 'none';
    emptyState.style.display = 'block';
    return;
  }
  
  grid.style.display = 'grid';
  emptyState.style.display = 'none';
  
  grid.innerHTML = filteredProjects.map(project => `
    <div class="project-card" onclick="openProject(${project.id})">
      <div class="project-header">
        <div class="project-icon">🔍</div>
        <div class="project-status ${project.status}">${project.status}</div>
      </div>
      
      <h3 class="project-title">${project.name}</h3>
      <p class="project-description">${project.description}</p>
      
      <div class="project-stats">
        <div class="project-stat">
          <div class="stat-value">${project.scrapes.toLocaleString()}</div>
          <div class="stat-label">Scrapes</div>
        </div>
        <div class="project-stat">
          <div class="stat-value">${project.successRate}%</div>
          <div class="stat-label">Success</div>
        </div>
        <div class="project-stat">
          <div class="stat-value">${project.lastRun}</div>
          <div class="stat-label">Last Run</div>
        </div>
      </div>
      
      <div class="project-footer">
        <div class="project-date">Created ${formatDate(project.createdAt)}</div>
        <div class="project-actions">
          <button class="action-icon" onclick="event.stopPropagation(); editProject(${project.id})">✏️</button>
          <button class="action-icon" onclick="event.stopPropagation(); deleteProject(${project.id})">🗑️</button>
        </div>
      </div>
    </div>
  `).join('');
}

// Format date
function formatDate(dateString) {
  const date = new Date(dateString);
  const now = new Date();
  const diffTime = Math.abs(now - date);
  const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
  
  if (diffDays === 1) return '1 day ago';
  if (diffDays < 7) return `${diffDays} days ago`;
  if (diffDays < 30) return `${Math.floor(diffDays / 7)} weeks ago`;
  return `${Math.floor(diffDays / 30)} months ago`;
}

// Filter projects
function filterProjects() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  const statusFilter = document.getElementById('statusFilter').value;
  const sortBy = document.getElementById('sortBy').value;
  
  let filtered = projects.filter(project => {
    const matchesSearch = project.name.toLowerCase().includes(searchTerm) || 
                         project.description.toLowerCase().includes(searchTerm);
    const matchesStatus = !statusFilter || project.status === statusFilter;
    return matchesSearch && matchesStatus;
  });
  
  // Sort projects
  filtered.sort((a, b) => {
    switch (sortBy) {
      case 'name':
        return a.name.localeCompare(b.name);
      case 'scrapes':
        return b.scrapes - a.scrapes;
      case 'recent':
      default:
        return new Date(b.createdAt) - new Date(a.createdAt);
    }
  });
  
  loadProjects(filtered);
}

// Modal functions
function openModal() {
  document.getElementById('createModal').classList.add('active');
}

function closeModal() {
  document.getElementById('createModal').classList.remove('active');
  document.getElementById('projectForm').reset();
}

// Create project
document.getElementById('projectForm').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const newProject = {
    id: projects.length + 1,
    name: document.getElementById('projectName').value,
    description: document.getElementById('projectDescription').value,
    url: document.getElementById('targetUrl').value,
    status: 'active',
    scrapes: 0,
    successRate: 100,
    lastRun: 'Just now',
    createdAt: new Date().toISOString().split('T')[0]
  };
  
  projects.unshift(newProject);
  loadProjects();
  closeModal();
  
  showNotification('Project created successfully!');
});

// Project actions
function openProject(id) {
  showNotification(`Opening project ${id}...`);
  // In a real app, this would navigate to the project details
}

function editProject(id) {
  showNotification(`Editing project ${id}...`);
  // In a real app, this would open an edit modal
}

function deleteProject(id) {
  if (confirm('Are you sure you want to delete this project?')) {
    projects = projects.filter(p => p.id !== id);
    loadProjects();
    showNotification('Project deleted successfully!');
  }
}

// Show notification
function showNotification(message) {
  const notification = document.createElement('div');
  notification.style.cssText = `
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--gradient-primary);
    color: white;
    padding: 16px 24px;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-xl);
    z-index: 1000;
    animation: slideIn 0.3s ease;
  `;
  notification.textContent = message;
  
  document.body.appendChild(notification);
  
  setTimeout(() => {
    notification.style.animation = 'slideOut 0.3s ease';
    setTimeout(() => {
      document.body.removeChild(notification);
    }, 300);
  }, 3000);
}

    }
  }
`;

// Close modal on outside click

  if (e.target === this) {

});

// Mobile sidebar toggle

    const header = document.querySelector('.header-content');

    menuBtn.className = 'action-btn';
    menuBtn.innerHTML = '☰';
    menuBtn.onclick = toggleSidebar;
    header.insertBefore(menuBtn, header.firstChild);
  }
});
