<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScrapeFlow - Modern Web Scraper</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #3b82f6;
  --primary-dark: #2563eb;
  --secondary: #10b981;
  --accent: #8b5cf6;
  --danger: #ef4444;
  --warning: #f59e0b;
  --bg-primary: #ffffff;
  --bg-secondary: #f8fafc;
  --bg-tertiary: #f1f5f9;
  --text-primary: #1e293b;
  --text-secondary: #64748b;
  --text-tertiary: #94a3b8;
  --border: #e2e8f0;
  --border-light: #f1f5f9;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
  --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  overflow-x: hidden;
}

/* Subtle background pattern */
.bg-pattern {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: 
    radial-gradient(circle at 25% 25%, rgba(59, 130, 246, 0.03) 0%, transparent 50%),
    radial-gradient(circle at 75% 75%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
  z-index: -1;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
}

/* Header */
header {
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 24px;
  font-weight: 700;
  color: var(--text-primary);
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 20px;
  box-shadow: var(--shadow-md);
}

.nav-actions {
  display: flex;
  align-items: center;
  gap: 20px;
}

.server-status {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-tertiary);
  transition: all 0.3s ease;
}

.status-dot.online {
  background: var(--secondary);
  box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
}

.nav-tabs {
  display: flex;
  gap: 4px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px;
}

.nav-tab {
  padding: 8px 16px;
  border: none;
  border-radius: calc(var(--radius) - 4px);
  background: transparent;
  color: var(--text-secondary);
  font-weight: 500;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.nav-tab.active {
  background: var(--bg-primary);
  color: var(--primary);
  box-shadow: var(--shadow-sm);
}

.nav-tab:hover:not(.active) {
  color: var(--text-primary);
}

/* Main Content */
main {
  padding: 60px 0;
}

.hero {
  text-align: center;
  margin-bottom: 60px;
}

.hero h1 {
  font-size: clamp(36px, 6vw, 64px);
  font-weight: 800;
  line-height: 1.1;
  margin-bottom: 16px;
  color: var(--text-primary);
}

.hero .subtitle {
  font-size: clamp(20px, 3vw, 32px);
  font-weight: 600;
  color: var(--primary);
  margin-bottom: 24px;
}

.hero .description {
  font-size: 18px;
  color: var(--text-secondary);
  max-width: 600px;
  margin: 0 auto 40px;
  line-height: 1.7;
}

.features {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 50px;
  flex-wrap: wrap;
}

.feature-card {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  font-weight: 500;
  color: var(--text-primary);
  transition: all 0.2s ease;
}

.feature-card:hover {
  border-color: var(--primary);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.feature-icon {
  width: 24px;
  height: 24px;
  background: var(--primary);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 12px;
}

/* URL Input Section */
.url-section {
  max-width: 700px;
  margin: 0 auto;
}

.url-container {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 32px;
  box-shadow: var(--shadow-lg);
}

.url-input-wrapper {
  position: relative;
  margin-bottom: 24px;
}

.url-input {
  width: 100%;
  padding: 16px 20px 16px 50px;
  background: var(--bg-secondary);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  font-size: 16px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-primary);
  outline: none;
  transition: all 0.2s ease;
}

.url-input::placeholder {
  color: var(--text-tertiary);
}

.url-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

.url-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-tertiary);
  font-size: 18px;
}

.url-status {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
  font-size: 14px;
  color: var(--secondary);
  font-weight: 500;
  opacity: 0;
  transition: opacity 0.2s ease;
}

.url-status.show {
  opacity: 1;
}

.scrape-btn {
  width: 100%;
  padding: 16px 24px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border: none;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  color: white;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.scrape-btn:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: var(--shadow-lg);
}

.scrape-btn:active:not(:disabled) {
  transform: translateY(0);
}

.scrape-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

/* Results Section */
.results-section {
  max-width: 1000px;
  margin: 60px auto 0;
  display: none;
}

.results-section.show {
  display: block;
  animation: slideUp 0.3s ease-out;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.results-container {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 32px;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
}

.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 16px;
  flex-wrap: wrap;
}

.tab {
  padding: 10px 20px;
  background: transparent;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
}

.tab.active {
  color: var(--primary);
  background: var(--bg-secondary);
}

.tab.active::after {
  content: '';
  position: absolute;
  bottom: -16px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--primary);
}

.tab:hover:not(.active) {
  color: var(--text-primary);
  background: var(--bg-tertiary);
}

.tab-content {
  display: none;
  max-height: 600px;
  overflow-y: auto;
}

.tab-content.active {
  display: block;
  animation: fadeIn 0.3s ease-out;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Content styling with proper containment */
.content-section {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
}

.content-header {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.text-content {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-secondary);
  white-space: pre-wrap;
  word-wrap: break-word;
  max-height: 400px;
  overflow-y: auto;
  padding: 16px;
  background: var(--bg-primary);
  border: 1px solid var(--border-light);
  border-radius: calc(var(--radius) - 4px);
}

.data-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.data-table th,
.data-table td {
  padding: 12px 16px;
  text-align: left;
  border-bottom: 1px solid var(--border-light);
}

.data-table th {
  background: var(--bg-secondary);
  font-weight: 600;
  color: var(--text-primary);
  font-size: 14px;
  font-family: 'Inter', sans-serif;
}

.data-table td {
  font-size: 14px;
  color: var(--text-secondary);
  font-family: 'JetBrains Mono', monospace;
  word-break: break-all;
}

.data-table tr:last-child td {
  border-bottom: none;
}

.data-table tr:hover {
  background: var(--bg-secondary);
}

.data-table a {
  color: var(--primary);
  text-decoration: none;
  transition: color 0.2s ease;
}

.data-table a:hover {
  color: var(--primary-dark);
  text-decoration: underline;
}

.images-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
  margin-top: 16px;
}

.image-card {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all 0.2s ease;
}

.image-card:hover {
  border-color: var(--primary);
  box-shadow: var(--shadow-md);
}

.image-card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  display: block;
}

.image-info {
  padding: 12px;
  font-size: 12px;
  color: var(--text-secondary);
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg-secondary);
  word-break: break-all;
}

/* Loading state */
.loading {
  text-align: center;
  padding: 40px;
  color: var(--text-secondary);
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 20px;
}

.method-steps {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
  max-width: 400px;
  margin: 0 auto;
}

.method-step {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-secondary);
  transition: all 0.3s ease;
  width: 100%;
}

.method-step.active {
  border-color: var(--primary);
  color: var(--primary);
  background: rgba(59, 130, 246, 0.05);
}

.method-step.success {
  border-color: var(--secondary);
  color: var(--secondary);
  background: rgba(16, 185, 129, 0.05);
}

.method-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-tertiary);
  transition: all 0.3s ease;
}

.method-step.active .method-dot {
  background: var(--primary);
  animation: pulse 2s infinite;
}

.method-step.success .method-dot {
  background: var(--secondary);
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Error state */
.error {
  background: rgba(239, 68, 68, 0.05);
  border: 1px solid rgba(239, 68, 68, 0.2);
  border-radius: var(--radius);
  padding: 24px;
  text-align: center;
  margin: 20px 0;
}

.error-icon {
  font-size: 36px;
  margin-bottom: 16px;
  color: var(--danger);
}

.error-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--danger);
  margin-bottom: 8px;
}

.error-message {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px;
  color: var(--text-tertiary);
  font-size: 16px;
}

/* Scrollbar styling */
::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}

::-webkit-scrollbar-track {
  background: var(--bg-secondary);
  border-radius: 4px;
}

::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--text-tertiary);
}

/* Responsive */
@media (max-width: 768px) {
  .container {
    padding: 0 16px;
  }
  
  .hero h1 {
    font-size: 36px;
  }
  
  .hero .subtitle {
    font-size: 24px;
  }
  
  .features {
    flex-direction: column;
    align-items: center;
  }
  
  .feature-card {
    width: 100%;
    max-width: 300px;
    justify-content: center;
  }
  
  .url-container {
    padding: 24px 20px;
  }
  
  .results-container {
    padding: 24px 20px;
  }
  
  .tabs {
    gap: 4px;
  }
  
  .tab {
    padding: 8px 12px;
    font-size: 13px;
  }
  
  .images-grid {
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
  }
  
  .data-table {
    font-size: 12px;
  }
  
  .data-table th,
  .data-table td {
    padding: 8px 12px;
  }
}

@media (max-width: 480px) {
  .nav {
    flex-direction: column;
    gap: 16px;
  }
  
  .nav-actions {
    width: 100%;
    justify-content: space-between;
  }
  
  .hero .description {
    font-size: 16px;
  }
}
</style>
</head>
<body>
<div class="bg-pattern"></div>

<header>
  <div class="container">
    <nav class="nav">
      <div class="logo">
        <div class="logo-icon">🌐</div>
        ScrapeFlow
      </div>
      <div class="nav-actions">
        <div class="server-status">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText">Checking...</span>
        </div>
        <div class="nav-tabs">
          <button class="nav-tab active" onclick="switchView('scraper')">Scraper</button>
          <button class="nav-tab" onclick="switchView('history')">History</button>
        </div>
      </div>
    </nav>
  </div>
</header>

<main>
  <div class="container">
    <div class="hero">
      <h1>ScrapeFlow</h1>
      <div class="subtitle">Modern Web Scraping Tool</div>
      <p class="description">
        Transform any website into structured data with our powerful scraping engine. 
        Fast, reliable, and easy to use.
      </p>
      
      <div class="features">
        <div class="feature-card">
          <div class="feature-icon">⚡</div>
          Lightning Fast
        </div>
        <div class="feature-card">
          <div class="feature-icon">🤖</div>
          AI Powered
        </div>
        <div class="feature-card">
          <div class="feature-icon">🔒</div>
          Anti-Bot Proof
        </div>
      </div>
    </div>
    
    <div class="url-section">
      <div class="url-container">
        <div class="url-input-wrapper">
          <span class="url-icon">🔗</span>
          <input 
            type="url" 
            class="url-input" 
            id="urlInput" 
            placeholder="https://example.com"
            autocomplete="off"
          >
        </div>
        
        <div class="url-status" id="urlStatus">
          <div class="status-dot"></div>
          URL ready to scrape
        </div>
        
        <button class="scrape-btn" id="scrapeBtn" onclick="startScrape()">
          <span>Scrape Now</span>
          <span>→</span>
        </button>
      </div>
    </div>
    
    <div class="results-section" id="resultsSection">
      <div class="results-container">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('text')">Text</button>
          <button class="tab" onclick="switchTab('links')">Links</button>
          <button class="tab" onclick="switchTab('images')">Images</button>
          <button class="tab" onclick="switchTab('meta')">Meta</button>
        </div>
        
        <div class="tab-content active" id="textTab">
          <div id="textContent"></div>
        </div>
        
        <div class="tab-content" id="linksTab">
          <div id="linksContent"></div>
        </div>
        
        <div class="tab-content" id="imagesTab">
          <div id="imagesContent"></div>
        </div>
        
        <div class="tab-content" id="metaTab">
          <div id="metaContent"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
const API = 'http://localhost:5000';
let currentResult = null;

// URL validation
const urlInput = document.getElementById('urlInput');
const urlStatus = document.getElementById('urlStatus');
const scrapeBtn = document.getElementById('scrapeBtn');

urlInput.addEventListener('input', function() {
  const url = this.value.trim();
  if (url && isValidUrl(url)) {
    urlStatus.classList.add('show');
    scrapeBtn.disabled = false;
  } else {
    urlStatus.classList.remove('show');
    scrapeBtn.disabled = true;
  }
});

function isValidUrl(string) {
  try {
    new URL(string);
    return true;
  } catch (_) {
    return false;
  }
}

// Tab switching
function switchTab(tabName) {
  document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
  
  event.target.classList.add('active');
  document.getElementById(tabName + 'Tab').classList.add('active');
}

// View switching
function switchView(view) {
  document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
  event.target.classList.add('active');
  
  if (view === 'scraper') {
    document.querySelector('.hero').style.display = 'block';
    document.querySelector('.url-section').style.display = 'block';
    document.getElementById('resultsSection').classList.remove('show');
  } else {
    document.querySelector('.hero').style.display = 'none';
    document.querySelector('.url-section').style.display = 'none';
    document.getElementById('resultsSection').classList.add('show');
    // Load history here if needed
  }
}

// Server health check
async function checkServer() {
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  
  try {
    const response = await fetch(API + '/health', { signal: AbortSignal.timeout(3000) });
    if (response.ok) {
      statusDot.className = 'status-dot online';
      statusText.textContent = 'Online';
      return true;
    }
  } catch (error) {
    statusDot.className = 'status-dot';
    statusText.textContent = 'Offline';
    return false;
  }
}

// Main scraping function
async function startScrape() {
  let url = urlInput.value.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

  const online = await checkServer();
  if (!online) {
    showError('Server is offline. Please start the Python backend first.');
    return;
  }

  // Show loading state
  scrapeBtn.disabled = true;
  scrapeBtn.innerHTML = '<div class="spinner"></div> Scraping...';
  
  const resultsSection = document.getElementById('resultsSection');
  resultsSection.classList.add('show');
  
  // Show loading animation
  document.getElementById('textContent').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Scraping ${url}...</div>
      <div class="method-steps">
        <div class="method-step active" id="step1">
          <div class="method-dot"></div>
          ⚡ Trying requests + BeautifulSoup
        </div>
        <div class="method-step" id="step2">
          <div class="method-dot"></div>
          🎭 Fallback to Playwright
        </div>
      </div>
    </div>
  `;

  try {
    const response = await fetch(API + '/scrape', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: url })
    });

    if (!response.ok) throw new Error('Scraping failed');
    
    const result = await response.json();
    
    if (!result.ok) {
      throw new Error(result.error || 'Scraping failed');
    }
    
    currentResult = result.data;
    
    // Update method steps
    if (result.data.method === 'requests') {
      document.getElementById('step1').className = 'method-step success';
      document.getElementById('step2').className = 'method-step';
    } else {
      document.getElementById('step1').className = 'method-step';
      document.getElementById('step2').className = 'method-step success';
    }
    
    setTimeout(() => {
      displayResults(result.data);
    }, 800);
    
  } catch (error) {
    console.error('Scraping error:', error);
    showError('Failed to scrape the website. Please try again.\n\n' + error.message);
  } finally {
    scrapeBtn.disabled = false;
    scrapeBtn.innerHTML = '<span>Scrape Now</span><span>→</span>';
  }
}

function displayResults(data) {
  // Display text content
  const textContent = document.getElementById('textContent');
  textContent.innerHTML = `
    <div class="content-section">
      <div class="content-header">Extracted Text (${data.word_count || 0} words)</div>
      <div class="text-content">${data.text || 'No text found'}</div>
    </div>
  `;
  
  // Display links
  const linksContent = document.getElementById('linksTab');
  if (data.links && data.links.length > 0) {
    linksContent.innerHTML = `
      <div class="content-section">
        <div class="content-header">Found Links (${data.links.length})</div>
        <div style="overflow-x: auto;">
          <table class="data-table">
            <thead>
              <tr><th>#</th><th>Text</th><th>URL</th></tr>
            </thead>
            <tbody>
              ${data.links.map((link, i) => `
                <tr>
                  <td>${i + 1}</td>
                  <td>${link.text || 'N/A'}</td>
                  <td><a href="${link.href}" target="_blank">${link.href}</a></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  } else {
    linksContent.innerHTML = '<div class="empty-state">No links found</div>';
  }
  
  // Display images
  const imagesContent = document.getElementById('imagesTab');
  if (data.images && data.images.length > 0) {
    imagesContent.innerHTML = `
      <div class="content-section">
        <div class="content-header">Found Images (${data.images.length})</div>
        <div class="images-grid">
          ${data.images.map(img => `
            <div class="image-card">
              <img src="${img.src}" alt="${img.alt || ''}" loading="lazy" onerror="this.parentElement.style.display='none'">
              <div class="image-info">${img.alt || 'No alt text'}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  } else {
    imagesContent.innerHTML = '<div class="empty-state">No images found</div>';
  }
  
  // Display meta data
  const metaContent = document.getElementById('metaTab');
  const metas = data.metas || [];
  const metaTags = {};
  metas.forEach(meta => {
    metaTags[meta.name] = meta.content;
  });
  
  metaContent.innerHTML = `
    <div class="content-section">
      <div class="content-header">Meta Information</div>
      <table class="data-table">
        <thead>
          <tr><th>Property</th><th>Value</th></tr>
        </thead>
        <tbody>
          <tr><td>Title</td><td>${data.title || 'N/A'}</td></tr>
          <tr><td>Description</td><td>${metaTags.description || 'N/A'}</td></tr>
          <tr><td>Keywords</td><td>${metaTags.keywords || 'N/A'}</td></tr>
          <tr><td>Method</td><td>${data.method || 'N/A'}</td></tr>
          <tr><td>Word Count</td><td>${data.word_count || '0'}</td></tr>
          <tr><td>Character Count</td><td>${data.characters || '0'}</td></tr>
        </tbody>
      </table>
    </div>
  `;
}

function showError(message) {
  const resultsSection = document.getElementById('resultsSection');
  resultsSection.classList.add('show');
  resultsSection.innerHTML = `
    <div class="results-container">
      <div class="error">
        <div class="error-icon">⚠️</div>
        <div class="error-title">Scraping Failed</div>
        <div class="error-message">${message}</div>
      </div>
    </div>
  `;
}

// Initialize
checkServer();
setInterval(checkServer, 10000);

// Add enter key support
urlInput.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    startScrape();
  }
});
</script>
