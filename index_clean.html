<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScrapeFlow - Professional Web Scraper</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* Light theme */
  --bg-primary: #ffffff;
  --bg-secondary: #f8fafc;
  --bg-tertiary: #f1f5f9;
  --bg-glass: rgba(255, 255, 255, 0.8);
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-tertiary: #94a3b8;
  --border: #e2e8f0;
  --border-light: #f1f5f9;
  --primary: #3b82f6;
  --primary-dark: #2563eb;
  --primary-light: #60a5fa;
  --secondary: #10b981;
  --accent: #8b5cf6;
  --accent-light: #a78bfa;
  --danger: #ef4444;
  --warning: #f59e0b;
  --success: #10b981;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
  --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
  --gradient-primary: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
  --gradient-secondary: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 24px;
}

/* Dark theme */
[data-theme="dark"] {
  --bg-primary: #0f172a;
  --bg-secondary: #1e293b;
  --bg-tertiary: #334155;
  --bg-glass: rgba(30, 41, 59, 0.8);
  --text-primary: #f8fafc;
  --text-secondary: #cbd5e1;
  --text-tertiary: #94a3b8;
  --border: #334155;
  --border-light: #475569;
  --primary: #60a5fa;
  --primary-dark: #3b82f6;
  --primary-light: #93c5fd;
  --secondary: #34d399;
  --accent: #a78bfa;
  --accent-light: #c4b5fd;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5);
  --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.6);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  overflow-x: hidden;
  transition: background 0.3s ease, color 0.3s ease;
}

/* Enhanced animated background */
.bg-gradient {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
    radial-gradient(circle at 40% 60%, rgba(16, 185, 129, 0.08) 0%, transparent 50%);
  z-index: -1;
  transition: opacity 0.3s ease;
  animation: gradientShift 10s ease-in-out infinite;
}

@keyframes gradientShift {
  0%, 100% { transform: scale(1) rotate(0deg); }
  50% { transform: scale(1.1) rotate(2deg); }
}

[data-theme="dark"] .bg-gradient {
  opacity: 0.4;
}

/* Particles */
.particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  pointer-events: none;
  overflow: hidden;
}

.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: var(--primary);
  border-radius: 50%;
  opacity: 0.3;
  animation: float 20s infinite linear;
}

@keyframes float {
  from {
    transform: translateY(100vh) translateX(0);
    opacity: 0;
  }
  10% {
    opacity: 0.3;
  }
  90% {
    opacity: 0.3;
  }
  to {
    transform: translateY(-100vh) translateX(100px);
    opacity: 0;
  }
}

/* Container */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
}

/* Header */
header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: var(--bg-glass);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  z-index: 100;
  transition: all 0.3s ease;
}

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 24px;
  font-weight: 800;
  color: var(--text-primary);
  transition: color 0.3s ease;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: var(--gradient-primary);
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 18px;
  box-shadow: var(--shadow-md);
  transition: all 0.3s ease;
}

.logo:hover .logo-icon {
  transform: scale(1.05) rotate(5deg);
  box-shadow: var(--shadow-lg);
}

.nav-actions {
  display: flex;
  align-items: center;
  gap: 24px;
}

.theme-toggle {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-2xl);
  padding: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.theme-toggle::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--gradient-primary);
  opacity: 0;
  transition: opacity 0.3s ease;
  border-radius: inherit;
}

.theme-toggle:hover {
  border-color: var(--primary);
  transform: scale(1.05) rotate(180deg);
}

.theme-toggle:hover::before {
  opacity: 0.1;
}

.theme-icon {
  font-size: 20px;
  transition: transform 0.3s ease;
}

.theme-toggle:hover .theme-icon {
  transform: rotate(180deg);
}

.server-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  color: var(--text-secondary);
}

.status-dot {
  width: 8px;
  height: 8px;
  background: var(--text-tertiary);
  border-radius: 50%;
  transition: all 0.3s ease;
}

.status-dot.online {
  background: var(--success);
  box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.3);
}

.nav-tabs {
  display: flex;
  gap: 8px;
}

.nav-tab {
  padding: 8px 16px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.3s ease;
}

.nav-tab.active {
  background: var(--gradient-primary);
  color: white;
  border-color: var(--primary);
}

.nav-tab:hover:not(.active) {
  border-color: var(--primary);
  color: var(--primary);
  transform: translateY(-1px);
}

/* Main Content */
main {
  margin-top: 80px;
  min-height: calc(100vh - 80px);
}

/* Hero Section */
.hero {
  text-align: center;
  padding: 120px 0 80px;
  position: relative;
  overflow: hidden;
}

.hero h1 {
  font-size: 64px;
  font-weight: 800;
  color: var(--text-primary);
  margin-bottom: 24px;
  position: relative;
  display: inline-block;
  transition: all 0.3s ease;
}

.hero h1::before {
  content: attr(data-text);
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--gradient-primary);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
  transition: all 0.3s ease;
}

.hero:hover h1::before {
  background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
}

.subtitle {
  font-size: 28px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 32px;
  background: var(--gradient-primary);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
  display: inline-block;
}

.description {
  font-size: 18px;
  color: var(--text-secondary);
  max-width: 600px;
  margin: 0 auto 48px;
  line-height: 1.7;
}

.features {
  display: flex;
  gap: 24px;
  justify-content: center;
  flex-wrap: wrap;
}

.feature-card {
  background: var(--bg-glass);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 20px 24px;
  backdrop-filter: blur(20px);
  transition: all 0.3s ease;
  text-align: center;
  min-width: 140px;
}

.feature-card:hover {
  border-color: var(--primary);
  transform: translateY(-4px);
  box-shadow: var(--shadow-xl);
}

.feature-icon {
  font-size: 24px;
  margin-bottom: 8px;
  display: block;
}

/* URL Section */
.url-section {
  padding: 80px 0;
  text-align: center;
}

.url-container {
  max-width: 600px;
  margin: 0 auto;
  padding: 40px;
  background: var(--bg-glass);
  border: 1px solid var(--border);
  border-radius: var(--radius-2xl);
  backdrop-filter: blur(20px);
  transition: all 0.3s ease;
}

.url-container:hover {
  border-color: var(--primary);
  box-shadow: var(--shadow-xl);
}

.url-input-wrapper {
  position: relative;
  margin-bottom: 24px;
}

.url-input {
  width: 100%;
  padding: 20px 20px 20px 56px;
  background: var(--bg-secondary);
  border: 2px solid var(--border);
  border-radius: var(--radius-xl);
  font-size: 18px;
  color: var(--text-primary);
  outline: none;
  transition: all 0.3s ease;
  font-family: 'Inter', sans-serif;
}

.url-input::placeholder {
  color: var(--text-tertiary);
}

.url-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
  transform: translateY(-2px);
}

.url-icon {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 20px;
  color: var(--text-tertiary);
  transition: color 0.3s ease;
}

.url-input:focus + .url-icon {
  color: var(--primary);
}

.url-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 24px;
  opacity: 0;
  transform: translateY(-10px);
  transition: all 0.3s ease;
}

.url-status.show {
  opacity: 1;
  transform: translateY(0);
}

.scrape-btn {
  width: 100%;
  padding: 20px;
  background: var(--gradient-primary);
  border: none;
  border-radius: var(--radius-xl);
  font-size: 18px;
  font-weight: 700;
  color: white;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  text-transform: uppercase;
  letter-spacing: 1px;
  box-shadow: var(--shadow-lg);
}

.scrape-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
  transition: left 0.5s;
}

.scrape-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: var(--shadow-xl);
}

.scrape-btn:hover:not(:disabled)::before {
  left: 100%;
}

.scrape-btn:active:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: var(--shadow-lg);
}

.scrape-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

/* Results Section */
.results-section {
  padding: 80px 0;
  display: none;
}

.results-section.show {
  display: block;
}

.results-container {
  max-width: 1000px;
  margin: 0 auto;
  background: var(--bg-glass);
  border: 1px solid var(--border);
  border-radius: var(--radius-2xl);
  backdrop-filter: blur(20px);
  overflow: hidden;
}

.tabs {
  display: flex;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
}

.tab {
  padding: 16px 24px;
  background: transparent;
  border: none;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
}

.tab::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  width: 0;
  height: 2px;
  background: var(--primary);
  transform: translateX(-50%);
  transition: width 0.3s ease;
}

.tab.active {
  color: var(--primary);
}

.tab.active::after {
  width: 100%;
}

.tab:hover:not(.active) {
  color: var(--primary);
  background: var(--bg-tertiary);
}

.tab-content {
  padding: 40px;
  display: none;
}

.tab-content.active {
  display: block;
}

.content-section {
  margin-bottom: 32px;
}

.content-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
}

.content-icon {
  font-size: 24px;
}

.text-content {
  font-size: 16px;
  line-height: 1.7;
  color: var(--text-secondary);
  white-space: pre-wrap;
  word-wrap: break-word;
  max-height: 400px;
  overflow-y: auto;
  padding: 20px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
}

.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

.data-table th,
.data-table td {
  padding: 12px 16px;
  text-align: left;
  border-bottom: 1px solid var(--border-light);
}

.data-table th {
  background: var(--bg-tertiary);
  font-weight: 600;
  color: var(--text-primary);
}

.data-table td {
  color: var(--text-secondary);
}

.data-table a {
  color: var(--primary);
  text-decoration: none;
  transition: color 0.3s ease;
}

.data-table a:hover {
  color: var(--primary-dark);
  text-decoration: underline;
}

.images-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
}

.image-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: all 0.3s ease;
}

.image-card:hover {
  border-color: var(--primary);
  transform: scale(1.02);
}

.image-card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  transition: transform 0.3s ease;
}

.image-card:hover img {
  transform: scale(1.05);
}

.image-info {
  padding: 12px;
  font-size: 12px;
  color: var(--text-secondary);
  text-align: center;
}

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-tertiary);
  font-size: 16px;
}

/* Loading */
.loading {
  text-align: center;
  padding: 60px 20px;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid var(--border);
  border-top: 4px solid var(--primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 24px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.loading-text {
  font-size: 18px;
  color: var(--text-secondary);
  margin-bottom: 32px;
}

.method-steps {
  display: flex;
  flex-direction: column;
  gap: 16px;
  max-width: 400px;
  margin: 0 auto;
}

.method-step {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  font-size: 14px;
  color: var(--text-secondary);
  transition: all 0.3s ease;
}

.method-step.active {
  border-color: var(--primary);
  color: var(--text-primary);
}

.method-step.success {
  border-color: var(--success);
  color: var(--success);
}

.method-dot {
  width: 8px;
  height: 8px;
  background: var(--border);
  border-radius: 50%;
  transition: all 0.3s ease;
}

.method-step.active .method-dot {
  background: var(--warning);
  box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.3);
}

.method-step.success .method-dot {
  background: var(--success);
  box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.3);
}

/* Error */
.error {
  text-align: center;
  padding: 60px 20px;
}

.error-icon {
  font-size: 64px;
  margin-bottom: 24px;
}

.error-title {
  font-size: 24px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 16px;
}

.error-message {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.6;
  white-space: pre-wrap;
}

/* Responsive */
@media (max-width: 768px) {
  .container {
    padding: 0 16px;
  }
  
  .nav {
    flex-direction: column;
    gap: 16px;
  }
  
  .nav-actions {
    width: 100%;
    justify-content: space-between;
  }
  
  .hero h1 {
    font-size: 40px;
  }
  
  .hero .subtitle {
    font-size: 24px;
  }
  
  .features {
    flex-direction: column;
    align-items: center;
  }
  
  .feature-card {
    width: 100%;
    max-width: 300px;
    justify-content: center;
  }
  
  .url-container {
    padding: 32px 24px;
  }
  
  .results-container {
    padding: 32px 24px;
  }
  
  .tabs {
    gap: 4px;
  }
  
  .tab {
    padding: 10px 16px;
    font-size: 13px;
  }
  
  .images-grid {
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 16px;
  }
  
  .data-table {
    font-size: 12px;
  }
  
  .data-table th,
  .data-table td {
    padding: 12px 16px;
  }
}

@media (max-width: 480px) {
  .hero .description {
    font-size: 16px;
  }
  
  .url-input {
    font-size: 14px;
    padding: 16px 20px 16px 48px;
  }
  
  .scrape-btn {
    font-size: 14px;
    padding: 16px 24px;
  }
}
</style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="particles" id="particles"></div>

<header>
  <div class="container">
    <nav class="nav">
      <div class="logo">
        <div class="logo-icon">🚀</div>
        ScrapeFlow
      </div>
      <div class="nav-actions">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
          <span class="theme-icon" id="themeIcon">🌙</span>
        </button>
        <div class="server-status">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText">Checking...</span>
        </div>
        <div class="nav-tabs">
          <button class="nav-tab active" onclick="switchView('scraper')">Scraper</button>
          <button class="nav-tab" onclick="switchView('history')">History</button>
        </div>
      </div>
    </nav>
  </div>
</header>

<main>
  <div class="container">
    <div class="hero">
      <h1 data-text="ScrapeFlow">ScrapeFlow</h1>
      <div class="subtitle">Professional Web Scraping Tool</div>
      <p class="description">
        Transform any website into structured data with our powerful scraping engine. 
        Built for professionals, designed for excellence.
      </p>
      
      <div class="features">
        <div class="feature-card">
          <div class="feature-icon">⚡</div>
          Lightning Fast
        </div>
        <div class="feature-card">
          <div class="feature-icon">🤖</div>
          AI Powered
        </div>
        <div class="feature-card">
          <div class="feature-icon">🔒</div>
          Anti-Bot Proof
        </div>
      </div>
    </div>
    
    <div class="url-section">
      <div class="url-container">
        <div class="url-input-wrapper">
          <input 
            type="url" 
            class="url-input" 
            id="urlInput" 
            placeholder="https://example.com"
            autocomplete="off"
          >
          <span class="url-icon">🔗</span>
        </div>
        
        <div class="url-status" id="urlStatus">
          <div class="status-dot"></div>
          URL ready to scrape
        </div>
        
        <button class="scrape-btn" id="scrapeBtn" onclick="startScrape()">
          Scrape Now
        </button>
      </div>
    </div>
    
    <div class="results-section" id="resultsSection">
      <div class="results-container">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('text')">📄 Text</button>
          <button class="tab" onclick="switchTab('links')">🔗 Links</button>
          <button class="tab" onclick="switchTab('images')">🖼 Images</button>
          <button class="tab" onclick="switchTab('meta')">🏷 Meta</button>
        </div>
        
        <div class="tab-content active" id="textTab">
          <div id="textContent"></div>
        </div>
        
        <div class="tab-content" id="linksTab">
          <div id="linksContent"></div>
        </div>
        
        <div class="tab-content" id="imagesTab">
          <div id="imagesContent"></div>
        </div>
        
        <div class="tab-content" id="metaTab">
          <div id="metaContent"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
const API = 'http://localhost:5000';
let currentResult = null;

// Initialize particles
function createParticles() {
  const particlesContainer = document.getElementById('particles');
  const particleCount = 20;
  
  for (let i = 0; i < particleCount; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 20 + 's';
    particle.style.animationDuration = (15 + Math.random() * 10) + 's';
    particlesContainer.appendChild(particle);
  }
}

// Theme management
function initTheme() {
  const savedTheme = localStorage.getItem('scrapeflow_theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
  updateThemeIcon(savedTheme);
}

function toggleTheme() {
  const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
  const newTheme = currentTheme === 'light' ? 'dark' : 'light';
  
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('scrapeflow_theme', newTheme);
  updateThemeIcon(newTheme);
}

function updateThemeIcon(theme) {
  const icon = document.getElementById('themeIcon');
  icon.textContent = theme === 'light' ? '🌙' : '☀️';
}

// URL validation
const urlInput = document.getElementById('urlInput');
const urlStatus = document.getElementById('urlStatus');
const scrapeBtn = document.getElementById('scrapeBtn');

urlInput.addEventListener('input', function() {
  const url = this.value.trim();
  if (url && isValidUrl(url)) {
    urlStatus.classList.add('show');
    scrapeBtn.disabled = false;
  } else {
    urlStatus.classList.remove('show');
    scrapeBtn.disabled = true;
  }
});

function isValidUrl(string) {
  try {
    new URL(string);
    return true;
  } catch (_) {
    return false;
  }
}

// Tab switching
function switchTab(tabName) {
  document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
  
  event.target.classList.add('active');
  document.getElementById(tabName + 'Tab').classList.add('active');
}

// View switching
function switchView(view) {
  document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
  event.target.classList.add('active');
  
  if (view === 'scraper') {
    document.querySelector('.hero').style.display = 'block';
    document.querySelector('.url-section').style.display = 'block';
    document.getElementById('resultsSection').classList.remove('show');
  } else {
    document.querySelector('.hero').style.display = 'none';
    document.querySelector('.url-section').style.display = 'none';
    document.getElementById('resultsSection').classList.add('show');
    // Load history here if needed
  }
}

// Server health check
async function checkServer() {
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  
  try {
    const response = await fetch(API + '/health', { signal: AbortSignal.timeout(3000) });
    if (response.ok) {
      statusDot.className = 'status-dot online';
      statusText.textContent = 'Online';
      return true;
    }
  } catch (error) {
    statusDot.className = 'status-dot';
    statusText.textContent = 'Offline';
    return false;
  }
}

// Main scraping function
async function startScrape() {
  let url = urlInput.value.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

  const online = await checkServer();
  if (!online) {
    showError('Server is offline. Please start the Python backend first.');
    return;
  }

  // Show loading state
  scrapeBtn.disabled = true;
  scrapeBtn.innerHTML = '<div class="spinner"></div> Scraping...';
  
  const resultsSection = document.getElementById('resultsSection');
  resultsSection.classList.add('show');
  
  // Show loading animation
  document.getElementById('textContent').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Scraping ${url}...</div>
      <div class="method-steps">
        <div class="method-step active" id="step1">
          <div class="method-dot"></div>
          ⚡ Trying requests + BeautifulSoup
        </div>
        <div class="method-step" id="step2">
          <div class="method-dot"></div>
          🎭 Fallback to Playwright
        </div>
      </div>
    </div>
  `;

  try {
    const response = await fetch(API + '/scrape', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: url })
    });

    if (!response.ok) throw new Error('Scraping failed');
    
    const result = await response.json();
    
    if (!result.ok) {
      throw new Error(result.error || 'Scraping failed');
    }
    
    currentResult = result.data;
    
    // Update method steps
    if (result.data.method === 'requests') {
      document.getElementById('step1').className = 'method-step success';
      document.getElementById('step2').className = 'method-step';
    } else {
      document.getElementById('step1').className = 'method-step';
      document.getElementById('step2').className = 'method-step success';
    }
    
    setTimeout(() => {
      displayResults(result.data);
    }, 1000);
    
  } catch (error) {
    console.error('Scraping error:', error);
    showError('Failed to scrape website. Please try again.\n\n' + error.message);
  } finally {
    scrapeBtn.disabled = false;
    scrapeBtn.innerHTML = 'Scrape Now';
  }
}

function displayResults(data) {
  // Display text content
  const textContent = document.getElementById('textContent');
  textContent.innerHTML = `
    <div class="content-section">
      <div class="content-header">
        <div class="content-icon">📄</div>
        Extracted Text (${data.word_count || 0} words)
      </div>
      <div class="text-content">${data.text || 'No text found'}</div>
    </div>
  `;
  
  // Display links
  const linksContent = document.getElementById('linksTab');
  if (data.links && data.links.length > 0) {
    linksContent.innerHTML = `
      <div class="content-section">
        <div class="content-header">
          <div class="content-icon">🔗</div>
          Found Links (${data.links.length})
        </div>
        <div style="overflow-x: auto;">
          <table class="data-table">
            <thead>
              <tr><th>#</th><th>Text</th><th>URL</th></tr>
            </thead>
            <tbody>
              ${data.links.map((link, i) => `
                <tr>
                  <td>${i + 1}</td>
                  <td>${link.text || 'N/A'}</td>
                  <td><a href="${link.href}" target="_blank">${link.href}</a></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
  } else {
    linksContent.innerHTML = '<div class="empty-state">No links found</div>';
  }
  
  // Display images
  const imagesContent = document.getElementById('imagesTab');
  if (data.images && data.images.length > 0) {
    imagesContent.innerHTML = `
      <div class="content-section">
        <div class="content-header">
          <div class="content-icon">🖼</div>
          Found Images (${data.images.length})
        </div>
        <div class="images-grid">
          ${data.images.map(img => `
            <div class="image-card">
              <img src="${img.src}" alt="${img.alt || ''}" loading="lazy" onerror="this.parentElement.style.display='none'">
              <div class="image-info">${img.alt || 'No alt text'}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  } else {
    imagesContent.innerHTML = '<div class="empty-state">No images found</div>';
  }
  
  // Display meta data
  const metaContent = document.getElementById('metaTab');
  const metas = data.metas || [];
  const metaTags = {};
  metas.forEach(meta => {
    metaTags[meta.name] = meta.content;
  });
  
  metaContent.innerHTML = `
    <div class="content-section">
      <div class="content-header">
        <div class="content-icon">🏷</div>
        Meta Information
      </div>
      <table class="data-table">
        <thead>
          <tr><th>Property</th><th>Value</th></tr>
        </thead>
        <tbody>
          <tr><td>Title</td><td>${data.title || 'N/A'}</td></tr>
          <tr><td>Description</td><td>${metaTags.description || 'N/A'}</td></tr>
          <tr><td>Keywords</td><td>${metaTags.keywords || 'N/A'}</td></tr>
          <tr><td>Method</td><td>${data.method || 'N/A'}</td></tr>
          <tr><td>Word Count</td><td>${data.word_count || '0'}</td></tr>
          <tr><td>Character Count</td><td>${data.characters || '0'}</td></tr>
        </tbody>
      </table>
    </div>
  `;
}

function showError(message) {
  const resultsSection = document.getElementById('resultsSection');
  resultsSection.classList.add('show');
  resultsSection.innerHTML = `
    <div class="results-container">
      <div class="error">
        <div class="error-icon">⚠️</div>
        <div class="error-title">Scraping Failed</div>
        <div class="error-message">${message}</div>
      </div>
    </div>
  `;
}

// Initialize everything
document.addEventListener('DOMContentLoaded', function() {
  createParticles();
  initTheme();
  checkServer();
  setInterval(checkServer, 10000);
  
  // Add data-text attribute to hero title for hover effect
  const heroTitle = document.querySelector('.hero h1');
  if (heroTitle) {
    heroTitle.setAttribute('data-text', heroTitle.textContent);
  }
});

// Add enter key support
urlInput.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    startScrape();
  }
});
</script>
</body>
</html>
