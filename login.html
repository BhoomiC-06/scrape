<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - ScrapeFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* Light theme */
  --bg-primary: #ffffff;
  --bg-secondary: #f8fafc;
  --bg-tertiary: #f1f5f9;
  --bg-glass: rgba(255, 255, 255, 0.8);
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-tertiary: #94a3b8;
  --border: #e2e8f0;
  --border-light: #f1f5f9;
  --primary: #3b82f6;
  --primary-dark: #2563eb;
  --primary-light: #60a5fa;
  --secondary: #10b981;
  --accent: #8b5cf6;
  --accent-light: #a78bfa;
  --danger: #ef4444;
  --warning: #f59e0b;
  --success: #10b981;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
  --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
  --gradient-primary: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
  --gradient-secondary: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 24px;
}

/* Dark theme */
[data-theme="dark"] {
  --bg-primary: #0f172a;
  --bg-secondary: #1e293b;
  --bg-tertiary: #334155;
  --bg-glass: rgba(30, 41, 59, 0.8);
  --text-primary: #f8fafc;
  --text-secondary: #cbd5e1;
  --text-tertiary: #94a3b8;
  --border: #334155;
  --border-light: #475569;
  --primary: #60a5fa;
  --primary-dark: #3b82f6;
  --primary-light: #93c5fd;
  --secondary: #34d399;
  --accent: #a78bfa;
  --accent-light: #c4b5fd;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5);
  --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.6);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  overflow-x: hidden;
  transition: background 0.3s ease, color 0.3s ease;
  min-height: 100vh;
}

/* Animated background */
.bg-gradient {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: 
    radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
    radial-gradient(circle at 40% 60%, rgba(16, 185, 129, 0.08) 0%, transparent 50%);
  z-index: -1;
  transition: opacity 0.3s ease;
  animation: gradientShift 10s ease-in-out infinite;
}

@keyframes gradientShift {
  0%, 100% { transform: scale(1) rotate(0deg); }
  50% { transform: scale(1.1) rotate(2deg); }
}

[data-theme="dark"] .bg-gradient {
  opacity: 0.4;
}

/* Floating particles */
.particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  pointer-events: none;
  overflow: hidden;
}

.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: var(--primary);
  border-radius: 50%;
  opacity: 0.3;
  animation: float 20s infinite linear;
}

@keyframes float {
  from {
    transform: translateY(100vh) translateX(0);
    opacity: 0;
  }
  10% {
    opacity: 0.3;
  }
  90% {
    opacity: 0.3;
  }
  to {
    transform: translateY(-100vh) translateX(100px);
    opacity: 0;
  }
}

/* Login Container */
.login-container {
  display: flex;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
}

.login-card {
  background: var(--bg-glass);
  border: 1px solid var(--border);
  border-radius: var(--radius-2xl);
  padding: 48px;
  width: 100%;
  max-width: 440px;
  box-shadow: var(--shadow-xl);
  backdrop-filter: blur(20px);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.login-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--gradient-primary);
  opacity: 0.02;
  transition: opacity 0.3s ease;
}

.login-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 25px 30px -5px rgb(0 0 0 / 0.15);
}

.login-card:hover::before {
  opacity: 0.03;
}

/* Header */
.login-header {
  text-align: center;
  margin-bottom: 40px;
  position: relative;
  z-index: 1;
}

.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-size: 28px;
  font-weight: 800;
  color: var(--text-primary);
  margin-bottom: 16px;
  transition: color 0.3s ease;
}

.logo-icon {
  width: 48px;
  height: 48px;
  background: var(--gradient-primary);
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 24px;
  box-shadow: var(--shadow-md);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.logo-icon::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
  transform: rotate(45deg);
  transition: transform 0.6s;
}

.logo:hover .logo-icon {
  transform: scale(1.05) rotate(5deg);
  box-shadow: var(--shadow-lg);
}

.logo:hover .logo-icon::before {
  transform: rotate(45deg) translate(50%, 50%);
}

.login-title {
  font-size: 24px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.login-subtitle {
  font-size: 16px;
  color: var(--text-secondary);
}

/* Form */
.login-form {
  position: relative;
  z-index: 1;
}

.form-group {
  margin-bottom: 24px;
}

.form-label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  padding: 16px 20px;
  background: var(--bg-secondary);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  font-size: 16px;
  color: var(--text-primary);
  outline: none;
  transition: all 0.3s ease;
  font-family: 'Inter', sans-serif;
}

.form-input::placeholder {
  color: var(--text-tertiary);
}

.form-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
  transform: translateY(-1px);
}

.form-input.error {
  border-color: var(--danger);
}

.form-error {
  font-size: 14px;
  color: var(--danger);
  margin-top: 8px;
  display: none;
}

.form-error.show {
  display: block;
}

.input-icon {
  position: relative;
}

.input-icon .form-input {
  padding-left: 48px;
}

.input-icon::before {
  content: attr(data-icon);
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 18px;
  color: var(--text-tertiary);
  transition: color 0.3s ease;
}

.input-icon .form-input:focus ~ ::before {
  color: var(--primary);
}

/* Remember & Forgot */
.form-options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 32px;
}

.remember-me {
  display: flex;
  align-items: center;
  gap: 8px;
}

.checkbox {
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-secondary);
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.checkbox input {
  opacity: 0;
  position: absolute;
  cursor: pointer;
}

.checkbox input:checked ~ .checkmark {
  opacity: 1;
}

.checkmark {
  font-size: 12px;
  color: white;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.checkbox:hover {
  border-color: var(--primary);
}

.checkbox input:checked ~ .checkbox {
  background: var(--gradient-primary);
  border-color: var(--primary);
}

.remember-label {
  font-size: 14px;
  color: var(--text-secondary);
  cursor: pointer;
  user-select: none;
}

.forgot-link {
  font-size: 14px;
  color: var(--primary);
  text-decoration: none;
  font-weight: 500;
  transition: color 0.3s ease;
  position: relative;
}

.forgot-link::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  width: 0;
  height: 2px;
  background: var(--primary);
  transition: width 0.3s ease;
}

.forgot-link:hover {
  color: var(--primary-dark);
}

.forgot-link:hover::after {
  width: 100%;
}

/* Submit Button */
.submit-btn {
  width: 100%;
  padding: 18px 32px;
  background: var(--gradient-primary);
  border: none;
  border-radius: var(--radius-lg);
  font-size: 16px;
  font-weight: 700;
  color: white;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  z-index: 1;
  text-transform: uppercase;
  letter-spacing: 1px;
  box-shadow: var(--shadow-md);
}

.submit-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
  transition: left 0.5s;
}

.submit-btn::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width 0.6s, height 0.6s;
}

.submit-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: var(--shadow-xl);
}

.submit-btn:hover:not(:disabled)::before {
  left: 100%;
}

.submit-btn:hover:not(:disabled)::after {
  width: 300px;
  height: 300px;
}

.submit-btn:active:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: var(--shadow-lg);
}

.submit-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

/* Divider */
.divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 32px 0;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.divider span {
  font-size: 14px;
  color: var(--text-tertiary);
  font-weight: 500;
}

/* Social Login */
.social-login {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.social-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 14px 20px;
  background: var(--bg-secondary);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
}

.social-btn:hover {
  border-color: var(--primary);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.social-btn.google:hover {
  border-color: #ea4335;
  color: #ea4335;
}

.social-btn.github:hover {
  border-color: #333;
  color: #333;
}

.social-icon {
  font-size: 20px;
}

/* Sign Up Link */
.signup-link {
  text-align: center;
  margin-top: 32px;
  font-size: 14px;
  color: var(--text-secondary);
}

.signup-link a {
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
  transition: color 0.3s ease;
}

.signup-link a:hover {
  color: var(--primary-dark);
}

/* Theme Toggle */
.theme-toggle {
  position: absolute;
  top: 20px;
  right: 20px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-2xl);
  padding: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
  z-index: 10;
}

.theme-toggle::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--gradient-primary);
  opacity: 0;
  transition: opacity 0.3s ease;
  border-radius: inherit;
}

.theme-toggle:hover {
  border-color: var(--primary);
  transform: scale(1.05) rotate(180deg);
}

.theme-toggle:hover::before {
  opacity: 0.1;
}

.theme-icon {
  font-size: 20px;
  transition: transform 0.3s ease;
}

.theme-toggle:hover .theme-icon {
  transform: rotate(180deg);
}

/* Responsive */
@media (max-width: 480px) {
  .login-card {
    padding: 32px 24px;
  }
  
  .login-title {
    font-size: 20px;
  }
  
  .form-options {
    flex-direction: column;
    gap: 16px;
    align-items: flex-start;
  }
  
  .social-login {
    gap: 8px;
  }
}
</style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="particles" id="particles"></div>

<button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
  <span class="theme-icon" id="themeIcon">🌙</span>
</button>

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">
        <div class="logo-icon">🚀</div>
        ScrapeFlow
      </div>
      <h1 class="login-title">Welcome Back</h1>
      <p class="login-subtitle">Sign in to your account to continue</p>
    </div>
    
    <form class="login-form" id="loginForm">
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-icon" data-icon="📧">
          <input 
            type="email" 
            class="form-input" 
            id="email" 
            placeholder="Enter your email"
            required
          >
        </div>
        <div class="form-error" id="emailError">Please enter a valid email address</div>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-icon" data-icon="🔒">
          <input 
            type="password" 
            class="form-input" 
            id="password" 
            placeholder="Enter your password"
            required
          >
        </div>
        <div class="form-error" id="passwordError">Password must be at least 8 characters</div>
      </div>
      
      <div class="form-options">
        <label class="remember-me">
          <div class="checkbox">
            <input type="checkbox" id="remember">
            <span class="checkmark">✓</span>
          </div>
          <span class="remember-label">Remember me</span>
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>
      
      <button type="submit" class="submit-btn" id="loginBtn">
        Sign In
      </button>
    </form>
    
    <div class="divider">
      <span>OR</span>
    </div>
    
    <div class="social-login">
      <a href="#" class="social-btn google">
        <span class="social-icon">🔍</span>
        Continue with Google
      </a>
      <a href="#" class="social-btn github">
        <span class="social-icon">🐙</span>
        Continue with GitHub
      </a>
    </div>
    
    <div class="signup-link">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>
</div>

<script>
// Initialize particles
function createParticles() {
  const particlesContainer = document.getElementById('particles');
  const particleCount = 20;
  
  for (let i = 0; i < particleCount; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDelay = Math.random() * 20 + 's';
    particle.style.animationDuration = (15 + Math.random() * 10) + 's';
    particlesContainer.appendChild(particle);
  }
}

// Theme management
function initTheme() {
  const savedTheme = localStorage.getItem('scrapeflow_theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
  updateThemeIcon(savedTheme);
}

function toggleTheme() {
  const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
  const newTheme = currentTheme === 'light' ? 'dark' : 'light';
  
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('scrapeflow_theme', newTheme);
  updateThemeIcon(newTheme);
}

function updateThemeIcon(theme) {
  const icon = document.getElementById('themeIcon');
  icon.textContent = theme === 'light' ? '🌙' : '☀️';
}

// Form validation
function validateEmail(email) {
  const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return re.test(email);
}

function validatePassword(password) {
  return password.length >= 8;
}

function showError(inputId, errorId) {
  document.getElementById(inputId).classList.add('error');
  document.getElementById(errorId).classList.add('show');
}

function hideError(inputId, errorId) {
  document.getElementById(inputId).classList.remove('error');
  document.getElementById(errorId).classList.remove('show');
}

// Form submission
document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const loginBtn = document.getElementById('loginBtn');
  
  // Reset errors
  hideError('email', 'emailError');
  hideError('password', 'passwordError');
  
  let isValid = true;
  
  // Validate email
  if (!validateEmail(email)) {
    showError('email', 'emailError');
    isValid = false;
  }
  
  // Validate password
  if (!validatePassword(password)) {
    showError('password', 'passwordError');
    isValid = false;
  }
  
  if (!isValid) return;
  
  // Show loading state
  loginBtn.disabled = true;
  loginBtn.innerHTML = '<div class="spinner"></div> Signing in...';
  
  // Simulate API call
  setTimeout(() => {
    // Store login state
    localStorage.setItem('scrapeflow_user', JSON.stringify({
      email: email,
      name: email.split('@')[0],
      loginTime: new Date().toISOString()
    }));
    
    // Redirect to dashboard
    window.location.href = 'dashboard.html';
  }, 2000);
});

// Initialize everything
document.addEventListener('DOMContentLoaded', function() {
  createParticles();
  initTheme();
  
  // Check if already logged in
  const user = localStorage.getItem('scrapeflow_user');
  if (user) {
    window.location.href = 'dashboard.html';
  }
});

// Add input validation on blur
document.getElementById('email').addEventListener('blur', function() {
  if (this.value && !validateEmail(this.value)) {
    showError('email', 'emailError');
  } else {
    hideError('email', 'emailError');
  }
});

document.getElementById('password').addEventListener('blur', function() {
  if (this.value && !validatePassword(this.value)) {
    showError('password', 'passwordError');
  } else {
    hideError('password', 'passwordError');
  }
});
</script>
</body>
</html>
